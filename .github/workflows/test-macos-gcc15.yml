name: macOS GCC15 repro
on:
  push:
    branches:
      - fix-265-exclude-apple-xopen-source

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GCC 15
        run: brew install gcc@15
      - name: Configure
        run: |
          mkdir -p cmakebuild && cd cmakebuild
          cmake .. -DCMAKE_CXX_COMPILER=g++-15 -DCMAKE_C_COMPILER=gcc-15
      - name: Build
        run: cmake --build cmakebuild